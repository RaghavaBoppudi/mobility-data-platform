version: 2

models:
  - name: stg_taxi_trips
    columns:
      - name: pickup_datetime
        tests:
          - not_null
      - name: dropoff_datetime
        tests:
          - not_null
      - name: pickup_location_id
        tests:
          - not_null
      - name: dropoff_location_id
        tests:
          - not_null

  - name: int_trip_metrics
    columns:
      - name: trip_date
        tests:
          - not_null
      - name: total_amount
        tests:
          - not_null

  - name: fact_trips
    columns:
      - name: trip_date
        tests:
          - not_null
      - name: total_amount
        tests:
          - not_null

  - name: dim_date
    columns:
      - name: date_day
        tests:
          - unique
          - not_null
  - name: dim_location
    columns:
      - name: location_id
        tests:
          - unique
          - not_null